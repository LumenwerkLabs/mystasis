# ===========================================
# Mystasis Backend Docker Compose
# ===========================================
# Usage:
#   Development: docker-compose up -d
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Logs:        docker-compose logs -f api
#   Stop:        docker-compose down
#   Reset DB:    docker-compose down -v

services:
  # ===========================================
  # PostgreSQL with TimescaleDB
  # ===========================================
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: mystasis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mystasis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mystasis_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-mystasis_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mystasis} -d ${POSTGRES_DB:-mystasis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mystasis-network

  # ===========================================
  # OpenMed PII De-identification Service
  # ===========================================
  # NOTE: Before building, copy OpenMed library to openmed-service/openmed-lib/
  #       cp -r ../openmed openmed-service/openmed-lib
  openmed:
    build:
      context: ./openmed-service
      dockerfile: Dockerfile
    container_name: mystasis-openmed
    restart: unless-stopped
    environment:
      # API key for authentication (generate a secure random key for production)
      OPENMED_API_KEY: ${OPENMED_API_KEY:-}
      # Preload model on startup for faster first request (uses more memory)
      OPENMED_PRELOAD: ${OPENMED_PRELOAD:-false}
    # Development: exposed to host for testing
    # Production: change to 'expose: ["8001"]' for security (internal only)
    ports:
      - "${OPENMED_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - mystasis-network
    # Resource limits to prevent OOM
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ===========================================
  # NestJS API Server
  # ===========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mystasis-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      openmed:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-mystasis}:${POSTGRES_PASSWORD:-mystasis_dev_password}@db:5432/${POSTGRES_DB:-mystasis_db}?schema=public

      # Application
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}

      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}

      # LLM Integration (optional)
      LLM_API_URL: ${LLM_API_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}

      # OpenMed PII De-identification Service
      OPENMED_SERVICE_URL: http://openmed:8001
      OPENMED_API_KEY: ${OPENMED_API_KEY:-}
      OPENMED_ENABLED: ${OPENMED_ENABLED:-true}
      # In production, passthrough should be false to prevent PHI leakage
      OPENMED_ALLOW_PASSTHROUGH: ${OPENMED_ALLOW_PASSTHROUGH:-false}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-log}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - mystasis-network

# ===========================================
# Networks
# ===========================================
networks:
  mystasis-network:
    driver: bridge

# ===========================================
# Volumes
# ===========================================
volumes:
  postgres_data:
    driver: local
